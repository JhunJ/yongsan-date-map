<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f4f1ec">
<title>용산 감도 공간 지도</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box}
:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --bg:#f4f1ec;
  --bg-soft:#ece8e1;
  --surface:#fdfcfa;
  --surface-2:#ffffff;
  --line:rgba(28,25,23,.08);
  --line-strong:rgba(28,25,23,.14);
  --text:#1c1917;
  --text-2:#44403c;
  --muted:#78716c;
  --muted-2:#a8a29e;
  --accent:#292524;
  --shadow:0 1px 2px rgba(28,25,23,.04), 0 8px 24px rgba(28,25,23,.06);
  --shadow-lg:0 12px 40px rgba(28,25,23,.10);
  --radius:18px;
  --radius-sm:12px;
  --cafe:#5c7a8a;
  --food:#9b6b6b;
  --culture:#7a6b8a;
  --walk:#6b8f71;
  --dessert:#b8886b;
  --gold:#a67c3a;
}
body{
  margin:0;
  font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-bottom:var(--safe-bottom);
  -webkit-font-smoothing:antialiased;
}
.header{
  position:sticky;top:0;z-index:5000;
  background:rgba(244,241,236,.88);
  backdrop-filter:saturate(1.2) blur(18px);
  border-bottom:1px solid var(--line);
  padding:calc(14px + var(--safe-top)) 16px 14px;
}
.header-top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:2px}
.eyebrow{
  font-size:10px;font-weight:600;letter-spacing:.14em;
  color:var(--muted);text-transform:uppercase;
}
h1{font-size:22px;margin:0;letter-spacing:-.03em;font-weight:700;line-height:1.2}
.sub{font-size:12px;color:var(--muted);line-height:1.45;margin-top:6px}
.search-wrap{padding-top:14px}
.search{
  width:100%;border:1px solid var(--line-strong);
  border-radius:var(--radius-sm);
  padding:12px 14px;font-size:15px;
  background:var(--surface);
  outline:none;color:var(--text);
  transition:border-color .2s, box-shadow .2s;
}
.search::placeholder{color:var(--muted-2)}
.search:focus{
  border-color:rgba(28,25,23,.22);
  box-shadow:0 0 0 4px rgba(28,25,23,.05);
}
.filters{
  display:flex;gap:8px;overflow-x:auto;
  padding-top:12px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}
.filter{
  flex:0 0 auto;
  border:1px solid var(--line-strong);
  border-radius:999px;
  padding:8px 13px;
  font-size:12px;font-weight:600;
  background:var(--surface);
  color:var(--text-2);
  cursor:pointer;
  transition:all .18s ease;
  -webkit-tap-highlight-color:transparent;
}
.filter.active{
  background:var(--accent);
  border-color:var(--accent);
  color:#fafaf9;
  box-shadow:0 4px 14px rgba(28,25,23,.14);
}
.filter[data-cat="카페"].active{background:var(--cafe);border-color:var(--cafe)}
.filter[data-cat="음식"].active{background:var(--food);border-color:var(--food)}
.filter[data-cat="문화"].active{background:var(--culture);border-color:var(--culture)}
.filter[data-cat="산책"].active{background:var(--walk);border-color:var(--walk)}
.filter[data-cat="디저트"].active{background:var(--dessert);border-color:var(--dessert)}
.filter[data-cat="TOP10"].active{background:var(--gold);border-color:var(--gold)}
.tabs{
  display:flex;gap:0;padding-top:14px;
  background:var(--bg-soft);
  border-radius:var(--radius-sm);
  padding:4px;
  margin-top:14px;
}
.tab{
  flex:1;border:0;border-radius:10px;padding:10px 8px;
  font-size:13px;font-weight:600;
  background:transparent;color:var(--muted);
  cursor:pointer;transition:all .18s ease;
}
.tab.active{
  background:var(--surface-2);
  color:var(--text);
  box-shadow:0 1px 3px rgba(28,25,23,.08);
}
.map-shell{
  position:relative;
  margin:16px 16px 0;
  border-radius:22px;
  overflow:hidden;
  box-shadow:var(--shadow-lg);
  border:1px solid var(--line);
}
#map{
  height:44vh;min-height:250px;
  width:100%;z-index:1;
  background:#e8e4de;
}
.map-styles{
  position:absolute;bottom:12px;left:12px;z-index:1000;
  display:flex;gap:2px;
  background:rgba(253,252,250,.92);
  backdrop-filter:blur(12px);
  padding:3px;border-radius:999px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.map-style{
  border:0;border-radius:999px;padding:7px 11px;
  font-size:11px;font-weight:600;color:var(--muted);
  background:transparent;cursor:pointer;
  transition:all .15s ease;
}
.map-style.active{background:var(--accent);color:#fafaf9}
.leaflet-control-zoom{
  border:none!important;
  box-shadow:var(--shadow)!important;
  border-radius:14px!important;
  overflow:hidden;border:1px solid var(--line)!important;
}
.leaflet-control-zoom a{
  width:34px!important;height:34px!important;
  line-height:34px!important;font-size:16px!important;
  color:var(--text-2)!important;
  background:var(--surface)!important;
  border-bottom:1px solid var(--line)!important;
}
.leaflet-control-zoom a:last-child{border-bottom:none!important}
.leaflet-control-attribution{
  font-size:9px!important;
  background:rgba(253,252,250,.82)!important;
  backdrop-filter:blur(4px);
  padding:2px 6px!important;color:var(--muted)!important;
}
.leaflet-popup-content-wrapper{
  border-radius:16px!important;
  box-shadow:var(--shadow-lg)!important;
  padding:0!important;border:1px solid var(--line)!important;
}
.leaflet-popup-tip{background:var(--surface)!important}
.leaflet-popup-content{margin:0!important}
.popup-inner{padding:16px}
.popup-cat{
  display:inline-block;font-size:10px;font-weight:600;
  letter-spacing:.02em;border-radius:999px;
  padding:4px 8px;margin-bottom:8px;
}
.popup-area{font-size:12px;color:var(--muted);margin-top:4px}
.popup-theme{font-size:13px;color:var(--text-2);line-height:1.55;margin-top:10px}
.popup-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.popup-title{font-weight:700;font-size:17px;letter-spacing:-.03em;color:var(--text);line-height:1.25}
.map-icons{display:flex;gap:5px;flex:0 0 auto}
.mi{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:9px;
  text-decoration:none;font-size:10px;font-weight:700;color:#fff;
  transition:transform .15s ease, opacity .15s ease;
}
.mi:active{transform:scale(.94)}
.mi.g{background:#2d2a28}
.mi.n{background:#2db400}
.mi.k{background:#f5d020;color:#3a2f00}
.ratings{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.rt{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;background:var(--bg-soft);
  border:1px solid var(--line);
  border-radius:999px;padding:5px 9px;color:var(--text-2);
}
.rt i{font-style:normal;font-weight:700;min-width:12px;text-align:center;font-size:10px}
.rt.g i{color:var(--text)}
.rt.n i{color:#2db400}
.rt.k i{color:var(--gold)}
.rt b{font-weight:700;color:var(--text)}
.rt small{color:var(--muted);font-weight:500;margin-left:1px}
.map-pin{width:26px;height:34px;filter:drop-shadow(0 2px 6px rgba(28,25,23,.22));transition:transform .15s ease}
.map-pin svg{display:block;width:100%;height:100%}
.pin-wrap{display:flex;flex-direction:column;align-items:center}
.pin-label{
  text-align:center;margin-bottom:4px;
  background:rgba(253,252,250,.94);
  backdrop-filter:blur(8px);
  border:1px solid var(--line);
  border-radius:10px;padding:4px 8px 5px;
  box-shadow:0 4px 14px rgba(28,25,23,.10);
  max-width:92px;line-height:1.25;
}
.pin-name{
  font-size:10px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:80px;letter-spacing:-.02em;
}
.pin-cat{
  font-size:9px;font-weight:600;margin-top:3px;
  border-radius:999px;padding:2px 6px;display:inline-block;
  letter-spacing:-.01em;
}
.pin-cat.cafe{background:rgba(92,122,138,.12);color:var(--cafe)}
.pin-cat.food{background:rgba(155,107,107,.12);color:var(--food)}
.pin-cat.culture{background:rgba(122,107,138,.12);color:var(--culture)}
.pin-cat.walk{background:rgba(107,143,113,.12);color:var(--walk)}
.pin-cat.dessert{background:rgba(184,136,107,.12);color:var(--dessert)}
.custom-pin{background:transparent!important;border:none!important}
.panel{display:none}
.panel.active{display:block}
.count{
  padding:14px 18px 0;
  font-size:12px;font-weight:500;
  color:var(--muted);letter-spacing:-.01em;
}
.list{padding:10px 16px 24px}
.routes{padding:8px 16px 28px}
.route-card{
  background:var(--surface);
  border-radius:var(--radius);
  padding:18px 16px;
  margin-bottom:12px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.route-num{
  font-size:10px;font-weight:600;letter-spacing:.12em;
  color:var(--muted);text-transform:uppercase;margin-bottom:6px;
}
.route-title{font-size:16px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.route-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.route-steps{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.route-step{
  border:1px solid var(--line-strong);
  border-radius:999px;padding:8px 12px;
  font-size:12px;font-weight:600;
  background:var(--surface);
  color:var(--text-2);
  cursor:pointer;transition:all .15s ease;
}
.route-step:active{background:var(--bg-soft)}
.route-arrow{color:var(--muted-2);font-size:11px}
.card{
  background:var(--surface);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
}
.card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--cat-color, var(--accent));
  opacity:.85;
}
.card:active{transform:scale(.985)}
.card.highlight{
  background:linear-gradient(135deg, #fdfcfa 0%, #faf6ee 100%);
  border-color:rgba(166,124,58,.18);
}
.card.highlight::before{background:var(--gold)}
.card.cafe{--cat-color:var(--cafe)}
.card.food{--cat-color:var(--food)}
.card.culture{--cat-color:var(--culture)}
.card.walk{--cat-color:var(--walk)}
.card.dessert{--cat-color:var(--dessert)}
.card-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.card-meta{display:flex;align-items:center;gap:8px;min-width:0}
.cat-label{
  font-size:11px;font-weight:600;color:var(--cat-color);
  letter-spacing:-.01em;
}
.area-tag{
  font-size:11px;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.area-tag::before{content:"· ";opacity:.5}
.name{font-size:18px;font-weight:700;letter-spacing:-.03em;line-height:1.25;margin-bottom:4px}
.top-star{font-size:13px;margin-left:4px;opacity:.85}
.theme{font-size:13px;color:var(--text-2);line-height:1.55;margin-top:10px}
.keywords{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.45}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{
  display:inline-block;font-size:10px;font-weight:600;
  border-radius:999px;padding:4px 8px;
  letter-spacing:-.01em;
}
.tag.top{background:rgba(166,124,58,.10);color:var(--gold)}
.tag.pick{background:var(--bg-soft);color:var(--muted);border:1px solid var(--line)}
.badge.cafe{background:rgba(92,122,138,.10);color:var(--cafe)}
.badge.food{background:rgba(155,107,107,.10);color:var(--food)}
.badge.culture{background:rgba(122,107,138,.10);color:var(--culture)}
.badge.walk{background:rgba(107,143,113,.10);color:var(--walk)}
.badge.dessert{background:rgba(184,136,107,.10);color:var(--dessert)}
.footer{
  text-align:center;font-size:11px;color:var(--muted-2);
  letter-spacing:.04em;
  padding:8px 16px calc(20px + var(--safe-bottom));
}
</style>
</head>
<body>
<header class="header">
  <div class="header-top">
    <div>
      <div class="eyebrow">Yongsan · Curated</div>
      <h1>용산 감도 공간</h1>
    </div>
  </div>
  <div class="sub">지도와 리스트가 연동됩니다. 카드를 누르면 해당 위치로 이동해요.</div>
  <div class="search-wrap">
    <input class="search" id="search" type="search" placeholder="이름, 지역, 키워드로 검색" autocomplete="off">
  </div>
  <div class="filters" id="filters">
    <button class="filter active" data-cat="전체">전체</button>
    <button class="filter" data-cat="TOP10">TOP 10</button>
    <button class="filter" data-cat="카페">카페</button>
    <button class="filter" data-cat="음식">음식</button>
    <button class="filter" data-cat="문화">문화</button>
    <button class="filter" data-cat="산책">산책</button>
    <button class="filter" data-cat="디저트">디저트</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-panel="places">장소</button>
    <button class="tab" data-panel="routes">루트</button>
  </div>
</header>

<div id="panel-places" class="panel active">
  <div class="map-shell">
    <div id="map"></div>
    <div class="map-styles" id="mapStyles">
      <button class="map-style active" data-style="light">라이트</button>
      <button class="map-style" data-style="voyager">일반</button>
      <button class="map-style" data-style="dark">다크</button>
    </div>
  </div>
  <div class="count" id="count"></div>
  <main class="list" id="list"></main>
</div>

<div id="panel-routes" class="panel">
  <div class="routes" id="routes"></div>
</div>

<div class="footer">용산 · 서울숲 · 한남 · 효창공원</div>

<script>

  {name:"콤포타블 커피 남산점",cat:"카페",area:"후암동",theme:"남산뷰 / 우드톤 / 큰 창",keywords:"노을 시간, 조용한 데이트",lat:37.5495,lng:126.9805},

  {name:"유틸리티 커피 로스터스",cat:"카페",area:"원효로",theme:"드립 전문 / 콘크리트 + 스테인리스",keywords:"건축적 미감, 커피 퀄리티",lat:37.5385,lng:126.9585,top10:true,pick:true},
  {name:"크놀프",cat:"카페",area:"효창공원",theme:"레트로 다방 / 푸딩 / 멜론소다",keywords:"빈티지, 느린 시간감",lat:37.54,lng:126.9595,pick:true},
  {name:"엔지니어링클럽",cat:"카페",area:"용리단길",theme:"화이트 미니멀 / 디자인 감도",keywords:"조용한 작업, 디자인 감성",lat:37.533,lng:126.9725},
  {name:"폰트 용산점",cat:"카페",area:"신용산",theme:"블루리본 커피 / 따뜻한 미니멀",keywords:"chill vibe, 따뜻한 공간감",lat:37.5295,lng:126.9675,top10:true,pick:true},
  {name:"더 체임버 커피",cat:"카페",area:"신용산",theme:"모던 로스터리 / 블랙 외관",keywords:"도시적, 깔끔한 공간감",lat:37.529,lng:126.968},
  {name:"피어커피 바",cat:"카페",area:"한남동",theme:"스페셜티 커피 바 / 플랫화이트",keywords:"작고 아늑한 바 형태",lat:37.5345,lng:127.0005},
  {name:"언더트",cat:"카페",area:"용산",theme:"교토 느낌 / 한옥 / 자연광",keywords:"사진 맛집, 자연광",lat:37.5355,lng:126.9895,pick:true},

  {title:"자연스러움 속의 질서",desc:"공간 미감 + 대화 + 사진까지 결이 이어지는 조합",steps:["자키러브","3F LOBBY","언더트","다로베"]},
  {title:"건축 + 커피 + 문화",desc:"콘크리트/우드/LP/책 — 부드러움 속의 단단함",steps:["유틸리티 커피 로스터스","토크메모리","서울문화예술교육센터 용산"]},
  {title:"밝고 귀여운 데이트",desc:"사진도 잘 나오고 분위기 흐름이 좋은 루트",steps:["테디뵈르하우스","크놀프","나의 아저씨 촬영지"]},
  {title:"취향 아카이브 탐색",desc:"사진·디자인·패션 감도를 한 번에",steps:["PDF 서울","후지필름 하우스 오브 포토그래피 서울","그래픽"]},
  {title:"TOP10 하이라이트",desc:"정원재님 취향 기준 베스트 10",steps:["그래픽","PDF 서울","업스탠딩","유틸리티 커피 로스터스","3F LOBBY","포디 서울","푸투라서울","토크메모리","폰트 용산점","오일제"]}
];

places.forEach(p => {
  const q = encodeURIComponent(p.name + " 서울");
  p.google = p.google || `https://www.google.com/maps/search/${q}`;
  p.naver = p.naver || `https://map.naver.com/p/search/${q}`;
  p.kakao = p.kakao || `https://map.kakao.com/link/search/${encodeURIComponent(p.name + " " + p.area)}`;
});

function applyRatings(data){
  places.forEach(p => {
    const r = data[p.name];
    if(!r) return;
    p.ratings = {google: r.google || null, naver: r.naver || null, kakao: r.kakao || null};
    if(r.naverId) p.naver = `https://map.naver.com/p/entry/place/${r.naverId}`;
  });
}

function mapIcons(p){
  return `<div class="map-icons">
    <a class="mi g" href="${p.google}" target="_blank" rel="noopener" title="Google Maps">G</a>
    <a class="mi n" href="${p.naver}" target="_blank" rel="noopener" title="Naver Map">N</a>
    <a class="mi k" href="${p.kakao}" target="_blank" rel="noopener" title="Kakao Map">K</a>
  </div>`;
}

function ratingsHtml(p){
  const r = p.ratings || {};
  const parts = [];
  const add = (key, label, cls) => {
    const x = r[key];
    if(!x || (!x.score && !x.count)) return;
    const score = x.score ? `<b>${x.score}</b>` : "";
    const count = x.count ? `<small>(${x.count.toLocaleString()})</small>` : "";
    parts.push(`<span class="rt ${cls}"><i>${label}</i>${score}${count}</span>`);
  };
  add("google","G","g");
  add("naver","N","n");
  add("kakao","K","k");
  return parts.length ? `<div class="ratings">${parts.join("")}</div>` : "";
}

const colors = {카페:"#5c7a8a",음식:"#9b6b6b",문화:"#7a6b8a",산책:"#6b8f71",디저트:"#b8886b"};
const classMap = {카페:"cafe",음식:"food",문화:"culture",산책:"walk",디저트:"dessert"};

let activeCat = "전체";
let searchQuery = "";
const markerMap = new Map();

const mapStyles = {
  voyager:{
    url:"https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>'
  },
  light:{
    url:"https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>'
  },
  dark:{
    url:"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>'
  }
};

const map = L.map("map",{zoomControl:false}).setView([37.54,126.98],13);
L.control.zoom({position:"topright"}).addTo(map);

let tileLayer = L.tileLayer(mapStyles.light.url,{
  maxZoom:20, subdomains:"abcd", attribution:mapStyles.light.attribution, detectRetina:true
}).addTo(map);

document.getElementById("mapStyles").addEventListener("click", e => {
  const btn = e.target.closest(".map-style");
  if(!btn) return;
  document.querySelectorAll(".map-style").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const style = mapStyles[btn.dataset.style];
  tileLayer.setUrl(style.url);
  map.attributionControl.setPrefix(false);
});

const catEmoji = {};

function escHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
}

function makeIcon(p){
  const c = colors[p.cat];
  const cls = classMap[p.cat];
  const labelH = 34;
  const pinH = 36;
  const w = 88;
  return L.divIcon({
    className:"custom-pin",
    html:`<div class="pin-wrap">
      <div class="pin-label">
        <div class="pin-name" title="${escHtml(p.name)}">${escHtml(p.name)}</div>
        <span class="pin-cat ${cls}">${escHtml(p.cat)}</span>
      </div>
      <div class="map-pin"><svg viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.82 0 1 5.82 1 13c0 9.8 13 23 13 23s13-13.2 13-23C27 5.82 21.18 0 14 0z" fill="${c}"/><circle cx="14" cy="13" r="5.5" fill="#fff" opacity=".95"/></svg></div>
    </div>`,
    iconSize:[w, labelH + pinH],
    iconAnchor:[w / 2, labelH + pinH],
    popupAnchor:[0, -(labelH + pinH - 4)]
  });
}

function popupHtml(p){
  const cls = classMap[p.cat];
  return `<div class="popup-inner">
    <div class="popup-head">
      <div>
        <span class="popup-cat badge ${cls}">${p.cat}</span>
        <div class="popup-title">${p.name}${p.top10?" ·":""}</div>
        <div class="popup-area">${p.area}</div>
      </div>
      ${mapIcons(p)}
    </div>
    <div class="popup-theme">${p.theme}</div>
    ${ratingsHtml(p)}
  </div>`;
}

function matchPlace(p){
  if(activeCat === "TOP10" && !p.top10) return false;
  if(activeCat !== "전체" && activeCat !== "TOP10" && p.cat !== activeCat) return false;
  if(!searchQuery) return true;
  const hay = [p.name,p.area,p.theme,p.keywords||"",p.cat].join(" ").toLowerCase();
  return hay.includes(searchQuery);
}

function focusPlace(name){
  const p = places.find(x => x.name === name);
  if(!p) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(pn => pn.classList.remove("active"));
  document.querySelector('.tab[data-panel="places"]').classList.add("active");
  document.getElementById("panel-places").classList.add("active");
  activeCat = "전체";
  searchQuery = "";
  document.getElementById("search").value = "";
  document.querySelectorAll(".filter").forEach(b => b.classList.toggle("active", b.dataset.cat === "전체"));
  render();
  const m = markerMap.get(p.name);
  if(m){
    map.setView([p.lat,p.lng],16);
    m.openPopup();
    setTimeout(() => map.invalidateSize(), 200);
    window.scrollTo({top:document.querySelector(".map-shell").offsetTop - 8, behavior:"smooth"});
  }
}

function render(){
  markerMap.clear();
  map.eachLayer(layer => { if(layer instanceof L.Marker) map.removeLayer(layer); });

  const list = document.getElementById("list");
  list.innerHTML = "";
  const filtered = places.filter(matchPlace);
  const bounds = [];

  filtered.forEach(p => {
    const marker = L.marker([p.lat,p.lng],{icon:makeIcon(p)})
      .bindPopup(popupHtml(p),{maxWidth:280,minWidth:220,className:"place-popup"})
      .addTo(map);
    markerMap.set(p.name, marker);
    bounds.push([p.lat,p.lng]);

    const card = document.createElement("article");
    card.className = `card ${classMap[p.cat]}${p.top10?" highlight":""}`;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-meta">
          <span class="cat-label">${p.cat}</span>
          <span class="area-tag">${p.area}</span>
        </div>
        ${mapIcons(p)}
      </div>
      <div class="name">${p.name}${p.top10?'<span class="top-star">·</span>':""}</div>
      ${ratingsHtml(p)}
      <div class="theme">${p.theme}</div>
      ${p.keywords?`<div class="keywords">${p.keywords}</div>`:""}
      <div class="card-tags">
        ${p.top10?'<span class="tag top">TOP 10</span>':""}
        ${p.pick?'<span class="tag pick">추천</span>':""}
      </div>`;
    card.addEventListener("click", e => {
      if(e.target.closest("a")) return;
      map.setView([p.lat,p.lng],16);
      marker.openPopup();
      window.scrollTo({top:document.querySelector(".map-shell").offsetTop - 8, behavior:"smooth"});
    });
    list.appendChild(card);
  });

  document.getElementById("count").textContent = `${filtered.length}곳`;
  if(bounds.length) map.fitBounds(bounds,{padding:[28,28],maxZoom:14});
  setTimeout(() => map.invalidateSize(), 200);
}

function renderRoutes(){
  const el = document.getElementById("routes");
  el.innerHTML = routes.map((r,i) => `
    <div class="route-card">
      <div class="route-num">Route ${String(i+1).padStart(2,"0")}</div>
      <div class="route-title">${r.title}</div>
      <div class="route-desc">${r.desc}</div>
      <div class="route-steps">
        ${r.steps.map((s,j) => `${j?'<span class="route-arrow">→</span>':""}<button class="route-step" data-name="${s}">${s}</button>`).join("")}
      </div>
    </div>`).join("");
  el.querySelectorAll(".route-step").forEach(btn => {
    btn.addEventListener("click", () => focusPlace(btn.dataset.name));
  });
}

document.querySelectorAll(".filter").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCat = btn.dataset.cat;
    render();
  });
});

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.trim().toLowerCase();
  render();
});

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("panel-" + tab.dataset.panel).classList.add("active");
    if(tab.dataset.panel === "places") setTimeout(() => map.invalidateSize(), 200);
  });
});

render();
renderRoutes();

fetch("ratings.json")
  .then(r => r.json())
  .then(data => { applyRatings(data); render(); })
  .catch(() => {});
</script>
