<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f3ef">
<title>용산 감도 공간 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box}
:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --bg:#f8f9fb;
  --card:#fff;
  --text:#1a1a1a;
  --muted:#6b7280;
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-bottom:var(--safe-bottom);
}
.header{
  position:sticky;top:0;z-index:5000;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(16px);
  border-bottom:1px solid #e8e2d8;
  padding:calc(10px + var(--safe-top)) 12px 10px;
}
h1{font-size:20px;margin:0 0 4px;letter-spacing:-.4px}
.sub{font-size:12px;color:var(--muted);line-height:1.35}
.search-wrap{padding-top:10px}
.search{
  width:100%;
  border:1px solid #e0d8cc;
  border-radius:12px;
  padding:10px 12px;
  font-size:15px;
  background:#fff;
  outline:none;
}
.search:focus{border-color:#999;box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.filters{
  display:flex;gap:7px;overflow-x:auto;
  padding-top:10px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}
.filter{
  flex:0 0 auto;
  border:0;border-radius:999px;
  padding:8px 11px;
  font-size:13px;font-weight:700;
  background:#eee;color:#333;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.filter.active{outline:2px solid #222;outline-offset:1px}
.filter[data-cat="전체"]{background:#f3f4f6;color:#374151}
.filter[data-cat="TOP10"]{background:#fef3c7;color:#b45309}
.filter[data-cat="카페"]{background:#dbeafe;color:#1d4ed8}
.filter[data-cat="음식"]{background:#fee2e2;color:#b91c1c}
.filter[data-cat="문화"]{background:#ede9fe;color:#6d28d9}
.filter[data-cat="산책"]{background:#dcfce7;color:#15803d}
.filter[data-cat="디저트"]{background:#ffedd5;color:#c2410c}
.tabs{
  display:flex;gap:6px;padding-top:10px;
}
.tab{
  flex:1;border:0;border-radius:10px;padding:9px;
  font-size:13px;font-weight:700;background:#eee;color:#555;
  cursor:pointer;
}
.tab.active{background:#222;color:#fff}
.map-shell{
  position:relative;
  margin:10px 12px 0;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 28px rgba(15,23,42,.10), 0 2px 6px rgba(15,23,42,.06);
  border:1px solid rgba(0,0,0,.06);
}
#map{
  height:44vh;min-height:240px;
  width:100%;
  z-index:1;
  background:#e8edf2;
}
.map-styles{
  position:absolute;bottom:10px;left:10px;z-index:1000;
  display:flex;gap:5px;
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(10px);
  padding:4px;border-radius:999px;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}
.map-style{
  border:0;border-radius:999px;padding:6px 10px;
  font-size:11px;font-weight:700;color:#555;background:transparent;
  cursor:pointer;
}
.map-style.active{background:#1a73e8;color:#fff}
.leaflet-control-zoom{
  border:none!important;
  box-shadow:0 2px 10px rgba(0,0,0,.12)!important;
  border-radius:12px!important;
  overflow:hidden;
}
.leaflet-control-zoom a{
  width:36px!important;height:36px!important;
  line-height:36px!important;
  font-size:18px!important;
  color:#444!important;
  border-bottom:1px solid #eee!important;
}
.leaflet-control-zoom a:last-child{border-bottom:none!important}
.leaflet-control-attribution{
  font-size:9px!important;
  background:rgba(255,255,255,.78)!important;
  backdrop-filter:blur(4px);
  padding:2px 6px!important;
  border-radius:6px 0 0 0;
}
.leaflet-popup-content-wrapper{
  border-radius:14px!important;
  box-shadow:0 8px 24px rgba(0,0,0,.14)!important;
  padding:0!important;
}
.leaflet-popup-tip{background:#fff!important}
.leaflet-popup-content{margin:0!important}
.popup-inner{padding:14px 14px 12px}
.popup-cat{
  display:inline-block;font-size:10px;font-weight:800;
  border-radius:999px;padding:3px 7px;margin-bottom:6px;
}
.popup-area{font-size:12px;color:#6b7280;margin-top:2px}
.popup-theme{font-size:13px;color:#374151;line-height:1.45;margin-top:8px}
.popup-links{display:flex;gap:6px;margin-top:12px}
.popup-links a{
  flex:1;text-align:center;text-decoration:none;
  font-size:12px;font-weight:700;border-radius:10px;padding:8px 10px;
}
.popup-g{background:#f3f4f6;color:#111}
.popup-n{background:#03c75a;color:#fff}
.map-pin{
  width:28px;height:36px;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.28));
  transition:transform .15s ease;
}
.map-pin svg{display:block;width:100%;height:100%}
.leaflet-marker-icon.active-pin .map-pin{transform:scale(1.15) translateY(-2px)}
.panel{display:none}
.panel.active{display:block}
.count{
  padding:9px 14px 0;
  font-size:13px;
  color:var(--muted);
}
.list{padding:10px 12px 20px}
.routes{padding:0 12px 24px}
.route-card{
  background:#fff;border-radius:16px;padding:14px 12px;
  margin-bottom:10px;border:1px solid #eee;
  box-shadow:0 2px 9px rgba(0,0,0,.04);
}
.route-title{font-size:15px;font-weight:800;margin-bottom:4px}
.route-desc{font-size:12px;color:var(--muted);line-height:1.4;margin-bottom:10px}
.route-steps{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.route-step{
  border:0;border-radius:999px;padding:7px 10px;
  font-size:12px;font-weight:700;background:#f3f4f6;color:#333;
  cursor:pointer;
}
.route-arrow{color:#aaa;font-size:12px}
.card{
  background:var(--card);
  border-radius:16px;
  padding:13px 12px;
  margin-bottom:10px;
  box-shadow:0 2px 9px rgba(0,0,0,.055);
  border:1px solid #eee;
  border-left-width:5px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.card.highlight{border-color:#fcd34d;background:#fffbeb}
.card.cafe{border-left-color:#60a5fa}
.card.food{border-left-color:#f87171}
.card.culture{border-left-color:#a78bfa}
.card.walk{border-left-color:#4ade80}
.card.dessert{border-left-color:#fb923c}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.name{font-size:17px;font-weight:800;letter-spacing:-.3px}
.top-star{color:#f59e0b;font-size:14px;margin-left:4px}
.area{font-size:12px;color:#777;margin-top:3px}
.theme{font-size:13px;color:#444;line-height:1.45;margin-top:8px}
.keywords{font-size:11px;color:#888;margin-top:6px;line-height:1.4}
.links{display:flex;gap:5px;flex:0 0 auto}
.links a{
  text-decoration:none;
  font-size:11px;font-weight:800;
  border-radius:999px;
  padding:6px 8px;
  white-space:nowrap;
}
.g{background:#222;color:white}
.n{background:#03c75a;color:white}
.badge{
  display:inline-block;
  font-size:11px;font-weight:800;
  border-radius:999px;
  padding:4px 7px;
  margin-top:8px;
  margin-right:4px;
}
.badge.cafe{background:#dbeafe;color:#1d4ed8}
.badge.food{background:#fee2e2;color:#b91c1c}
.badge.culture{background:#ede9fe;color:#6d28d9}
.badge.walk{background:#dcfce7;color:#15803d}
.badge.dessert{background:#ffedd5;color:#c2410c}
.badge.top{background:#fef3c7;color:#b45309}
.note{
  font-size:12px;color:#6a5736;
  background:#fff7dd;
  margin:10px 12px 0;
  padding:10px 12px;
  border-radius:13px;
  line-height:1.45;
}
.popup-title{font-weight:800;font-size:16px;letter-spacing:-.3px;color:#111}
.footer{
  text-align:center;font-size:11px;color:#999;
  padding:0 12px calc(16px + var(--safe-bottom));
}
</style>
</head>
<body>
<header class="header">
  <h1>용산 감도 공간 지도</h1>
  <div class="sub">필터·검색으로 지도와 리스트를 함께 탐색 · 카드 탭하면 지도로 이동</div>
  <div class="search-wrap">
    <input class="search" id="search" type="search" placeholder="이름·지역·키워드 검색" autocomplete="off">
  </div>
  <div class="filters" id="filters">
    <button class="filter active" data-cat="전체">전체</button>

    <button class="filter" data-cat="디저트">🍧 디저트</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-panel="places">📍 장소</button>
    <button class="tab" data-panel="routes">🗺 추천 루트</button>
  </div>
</header>

<div id="panel-places" class="panel active">
  <div class="map-shell">
    <div id="map"></div>
    <div class="map-styles" id="mapStyles">

      <button class="map-style" data-style="light">라이트</button>
      <button class="map-style" data-style="dark">다크</button>
    </div>
  </div>
  <div class="note">Carto 지도(무료) · 좌표는 탐색용 기준점 · G/N 링크로 최종 확인</div>
  <div class="count" id="count"></div>
  <main class="list" id="list"></main>
</div>

<div id="panel-routes" class="panel">
  <div class="routes" id="routes"></div>
</div>

<div class="footer">용산 · 서울숲 · 한남 · 효창공원 감도 데이트 리스트</div>

  {name:"푸투라서울",cat:"문화",area:"북촌",theme:"건축·예술 복합공간 / 자연광",keywords:"건축미, 실험적 전시",lat:37.582,lng:126.9845,top10:true,pick:true},
  {name:"서울시립 사진미술관",cat:"문화",area:"도봉구",theme:"사진 전문 미술관 / 화이트 큐브",keywords:"사진예술, 조용한 관람",lat:37.665,lng:127.046},
  {name:"서울문화예술교육센터 용산",cat:"문화",area:"용산",theme:"LP·독서·워크숍 / 공공문화 라운지",keywords:"북토크, 공연, 무료 힐링",lat:37.5315,lng:126.9655,pick:true},
  {name:"믹상",cat:"문화",area:"용산",theme:"LP샵 / 음악 아카이브",keywords:"음악 취향 공유",lat:37.5335,lng:126.9945},
  {name:"나의 아저씨 촬영지",cat:"산책",area:"용산 기찻길",theme:"철길 감성 산책 / 사진 스팟",keywords:"커플 사진, 감성 산책",lat:37.5295,lng:126.9665,pick:true},
  {name:"윤슬",cat:"산책",area:"서울역",theme:"공공예술 파빌리온 / 도시 미감",keywords:"물결 반사, 사진 스팟",lat:37.555,lng:126.97},
  {name:"율디세",cat:"산책",area:"용산",theme:"돌담 + 자연광 / 동굴 느낌 공간",keywords:"비밀 아지트, 비 오는 날",lat:37.536,lng:126.989},
  {name:"젤라또 피케",cat:"디저트",area:"한남동",theme:"젤라또 + 크레페 + 라이프스타일",keywords:"데이트 디저트, 프렌치 빈티지",lat:37.5348,lng:127.0012}
];

const routes = [
  {title:"자연스러움 속의 질서",desc:"공간 미감 + 대화 + 사진까지 결이 이어지는 조합",steps:["자키러브","3F LOBBY","언더트","다로베"]},
  {title:"건축 + 커피 + 문화",desc:"콘크리트/우드/LP/책 — 부드러움 속의 단단함",steps:["유틸리티 커피 로스터스","토크메모리","서울문화예술교육센터 용산"]},
  {title:"밝고 귀여운 데이트",desc:"사진도 잘 나오고 분위기 흐름이 좋은 루트",steps:["테디뵈르하우스","크놀프","나의 아저씨 촬영지"]},
  {title:"취향 아카이브 탐색",desc:"사진·디자인·패션 감도를 한 번에",steps:["PDF 서울","후지필름 하우스 오브 포토그래피 서울","그래픽"]},
  {title:"TOP10 하이라이트",desc:"정원재님 취향 기준 베스트 10",steps:["그래픽","PDF 서울","업스탠딩","유틸리티 커피 로스터스","3F LOBBY","포디 서울","푸투라서울","토크메모리","폰트 용산점","오일제"]}
];

places.forEach(p => {
  const q = encodeURIComponent(p.name + " 서울");
  p.google = p.google || `https://www.google.com/maps/search/${q}`;
  p.naver = p.naver || `https://map.naver.com/p/search/${q}`;
});

const colors = {카페:"#2563eb",음식:"#dc2626",문화:"#7c3aed",산책:"#16a34a",디저트:"#ea580c"};
const classMap = {카페:"cafe",음식:"food",문화:"culture",산책:"walk",디저트:"dessert"};

let activeCat = "전체";
let searchQuery = "";
const markerMap = new Map();

const mapStyles = {
  voyager:{
    url:"https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>'
  },
  light:{
    url:"https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>'
  },
  dark:{
    url:"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>'
  }
};

const map = L.map("map",{zoomControl:false}).setView([37.54,126.98],13);
L.control.zoom({position:"topright"}).addTo(map);

let tileLayer = L.tileLayer(mapStyles.voyager.url,{
  maxZoom:20, subdomains:"abcd", attribution:mapStyles.voyager.attribution, detectRetina:true
}).addTo(map);

document.getElementById("mapStyles").addEventListener("click", e => {
  const btn = e.target.closest(".map-style");
  if(!btn) return;
  document.querySelectorAll(".map-style").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const style = mapStyles[btn.dataset.style];
  tileLayer.setUrl(style.url);
  map.attributionControl.setPrefix(false);
});

function makeIcon(cat){
  const c = colors[cat];
  return L.divIcon({
    className:"custom-pin",
    html:`<div class="map-pin"><svg viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.82 0 1 5.82 1 13c0 9.8 13 23 13 23s13-13.2 13-23C27 5.82 21.18 0 14 0z" fill="${c}"/><circle cx="14" cy="13" r="5.5" fill="#fff" opacity=".95"/></svg></div>`,
    iconSize:[28,36], iconAnchor:[14,36], popupAnchor:[0,-32]
  });
}

function popupHtml(p){
  const cls = classMap[p.cat];
  return `<div class="popup-inner">
    <span class="popup-cat badge ${cls}">${p.cat}</span>
    <div class="popup-title">${p.name}${p.top10?" ⭐":""}</div>
    <div class="popup-area">${p.area}</div>
    <div class="popup-theme">${p.theme}</div>
    <div class="popup-links">
      <a class="popup-g" href="${p.google}" target="_blank" rel="noopener">Google Maps</a>
      <a class="popup-n" href="${p.naver}" target="_blank" rel="noopener">Naver Map</a>
    </div>
  </div>`;
}

function matchPlace(p){
  if(activeCat === "TOP10" && !p.top10) return false;
  if(activeCat !== "전체" && activeCat !== "TOP10" && p.cat !== activeCat) return false;
  if(!searchQuery) return true;
  const hay = [p.name,p.area,p.theme,p.keywords||"",p.cat].join(" ").toLowerCase();
  return hay.includes(searchQuery);
}

function focusPlace(name){
  const p = places.find(x => x.name === name);
  if(!p) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(pn => pn.classList.remove("active"));
  document.querySelector('.tab[data-panel="places"]').classList.add("active");
  document.getElementById("panel-places").classList.add("active");
  activeCat = "전체";
  searchQuery = "";
  document.getElementById("search").value = "";
  document.querySelectorAll(".filter").forEach(b => b.classList.toggle("active", b.dataset.cat === "전체"));
  render();
  const m = markerMap.get(p.name);
  if(m){
    map.setView([p.lat,p.lng],16);
    m.openPopup();
    setTimeout(() => map.invalidateSize(), 200);
    window.scrollTo({top:document.querySelector(".map-shell").offsetTop - 8, behavior:"smooth"});
  }
}

function render(){
  markerMap.clear();
  map.eachLayer(layer => { if(layer instanceof L.Marker) map.removeLayer(layer); });

  const list = document.getElementById("list");
  list.innerHTML = "";
  const filtered = places.filter(matchPlace);
  const bounds = [];

  filtered.forEach(p => {
    const marker = L.marker([p.lat,p.lng],{icon:makeIcon(p.cat)})
      .bindPopup(popupHtml(p),{maxWidth:280,minWidth:220,className:"place-popup"})
      .addTo(map);
    markerMap.set(p.name, marker);
    bounds.push([p.lat,p.lng]);

    const card = document.createElement("article");
    card.className = `card ${classMap[p.cat]}${p.top10?" highlight":""}`;
    card.innerHTML = `
      <div class="row">
        <div>
          <div class="name">${p.name}${p.top10?'<span class="top-star">⭐</span>':""}</div>
          <div class="area">📍 ${p.area}</div>
        </div>
        <div class="links">
          <a class="g" href="${p.google}" target="_blank" rel="noopener">G</a>
          <a class="n" href="${p.naver}" target="_blank" rel="noopener">N</a>
        </div>
      </div>
      <div class="theme">${p.theme}</div>
      ${p.keywords?`<div class="keywords">${p.keywords}</div>`:""}
      <span class="badge ${classMap[p.cat]}">${p.cat}</span>
      ${p.top10?'<span class="badge top">TOP10</span>':""}
      ${p.pick?'<span class="badge top">추천</span>':""}`;
    card.addEventListener("click", e => {
      if(e.target.tagName.toLowerCase() === "a") return;
      map.setView([p.lat,p.lng],16);
      marker.openPopup();
      window.scrollTo({top:document.querySelector(".map-shell").offsetTop - 8, behavior:"smooth"});
    });
    list.appendChild(card);
  });

  document.getElementById("count").textContent = `${filtered.length}개 장소 · Carto 지도`;
  if(bounds.length) map.fitBounds(bounds,{padding:[28,28],maxZoom:14});
  setTimeout(() => map.invalidateSize(), 200);
}

function renderRoutes(){
  const el = document.getElementById("routes");
  el.innerHTML = routes.map(r => `
    <div class="route-card">
      <div class="route-title">${r.title}</div>
      <div class="route-desc">${r.desc}</div>
      <div class="route-steps">
        ${r.steps.map((s,i) => `${i?'<span class="route-arrow">→</span>':""}<button class="route-step" data-name="${s}">${s}</button>`).join("")}
      </div>
    </div>`).join("");
  el.querySelectorAll(".route-step").forEach(btn => {
    btn.addEventListener("click", () => focusPlace(btn.dataset.name));
  });
}

document.querySelectorAll(".filter").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCat = btn.dataset.cat;
    render();
  });
});

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.trim().toLowerCase();
  render();
});

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("panel-" + tab.dataset.panel).classList.add("active");
    if(tab.dataset.panel === "places") setTimeout(() => map.invalidateSize(), 200);
  });
});

render();
renderRoutes();
</script>
</body>
</html>
